<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streak: Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F4EE;
      --surface:   #FFFDF9;
      --border:    #E2DDD5;
      --border-mid:#C8C3BA;
      --ink:       #1C1A17;
      --ink-2:     #6B6760;
      --ink-3:     #A8A49F;
      --amber:     #C17B2F;
      --amber-bg:  #FDF3E3;
      --amber-ring:#E8A84A;
      --green:     #3A7D52;
      --green-bg:  #EDF7F1;
      --red:       #B84040;
      --today-col: #FFFAE8;
      --radius:    10px;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans:  'DM Sans', system-ui, sans-serif;
      --font-mono:  'DM Mono', 'Courier New', monospace;
      --transition: 160ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #18160F;
        --surface:   #211F17;
        --border:    #35322A;
        --border-mid:#4A4740;
        --ink:       #F0ECDF;
        --ink-2:     #9B9890;
        --ink-3:     #5C5955;
        --amber:     #E8A84A;
        --amber-bg:  #2A2010;
        --amber-ring:#E8A84A;
        --green:     #5FAF7A;
        --green-bg:  #122218;
        --red:       #E07070;
        --today-col: #252115;
      }
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 400;
      min-height: 100vh;
      padding: 0 0 4rem;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
    }

    .logo span {
      color: var(--amber);
    }

    .week-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: auto;
    }

    .week-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-2);
      min-width: 9rem;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--ink-2);
      cursor: pointer;
      font-size: 1rem;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }

    .nav-btn:hover { background: var(--border); color: var(--ink); }
    .nav-btn:active { opacity: 0.7; }

    .today-btn {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 0.75rem;
      height: 32px;
      border: 1px solid var(--amber-ring);
      border-radius: 6px;
      background: var(--amber-bg);
      color: var(--amber);
      cursor: pointer;
      transition: opacity var(--transition);
      white-space: nowrap;
    }

    .today-btn:hover { opacity: 0.75; }
    .today-btn.hidden { display: none; }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 0;
    }

    .add-form {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .add-input {
      flex: 1;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      padding: 0 1rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .add-input::placeholder { color: var(--ink-3); }
    .add-input:focus {
      border-color: var(--amber-ring);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--amber) 15%, transparent);
    }

    .add-btn {
      height: 42px;
      padding: 0 1.25rem;
      border: none;
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--bg);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity var(--transition);
    }

    .add-btn:hover { opacity: 0.8; }
    .add-btn:active { opacity: 0.6; }

    .grid-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .col-headers {
      display: grid;
      grid-template-columns: minmax(0, 1fr) repeat(7, 52px) 72px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .col-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 0;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-3);
      border-left: 1px solid var(--border);
    }

    .col-header:first-child {
      border-left: none;
      align-items: flex-start;
      padding-left: 1rem;
    }

    .col-header.is-today {
      background: var(--today-col);
      color: var(--amber);
    }

    .col-header .day-num {
      font-size: 0.85rem;
      font-weight: 500;
      color: inherit;
      line-height: 1.2;
    }

    .col-header.is-today .day-num {
      color: var(--amber);
    }

    .streak-header {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-3);
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--border);
    }

    .habit-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) repeat(7, 52px) 72px;
      border-top: 1px solid var(--border);
      min-height: 52px;
      transition: background var(--transition);
    }

    .habit-row:first-child { border-top: none; }
    .habit-row:hover { background: color-mix(in srgb, var(--amber) 3%, transparent); }

    .habit-name-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      min-width: 0;
    }

    .habit-name-text {
      font-size: 0.875rem;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .habit-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity var(--transition);
      flex-shrink: 0;
    }

    .habit-row:hover .habit-actions { opacity: 1; }

    .action-btn {
      width: 24px; height: 24px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--ink-3);
      cursor: pointer;
      font-size: 0.8rem;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), color var(--transition);
    }

    .action-btn:hover { background: var(--border); color: var(--ink); }
    .action-btn.delete:hover { background: #FBEAEA; color: var(--red); }

    .habit-name-input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--amber-ring);
      border-radius: 5px;
      background: var(--amber-bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 0.875rem;
      padding: 2px 6px;
      outline: none;
    }

    .check-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--border);
      cursor: pointer;
      position: relative;
    }

    .check-cell.is-today {
      background: var(--today-col);
    }

    .check-cell.is-future {
      cursor: default;
      background: color-mix(in srgb, var(--bg) 40%, transparent);
    }

    .check-btn {
      width: 30px; height: 30px;
      border: 1.5px solid var(--border-mid);
      border-radius: 7px;
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
      position: relative;
      overflow: hidden;
    }

    .check-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: var(--amber);
      opacity: 0;
      transform: scale(0.3);
      transition: opacity 120ms ease, transform 160ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .check-btn.checked {
      border-color: var(--amber);
      background: var(--amber-bg);
    }

    .check-btn.checked::after {
      opacity: 1;
      transform: scale(1);
    }

    .check-btn svg {
      width: 14px; height: 14px;
      stroke: #fff;
      stroke-width: 2.5;
      fill: none;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 120ms ease 60ms, transform 160ms cubic-bezier(0.34, 1.56, 0.64, 1) 60ms;
    }

    .check-btn.checked svg {
      opacity: 1;
      transform: scale(1);
    }

    .check-cell.is-future .check-btn {
      border-color: var(--border);
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .streak-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--border);
      padding: 0 0.5rem;
    }

    .streak-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--ink-3);
      background: transparent;
    }

    .streak-pill.active {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .streak-pill.active.long {
      background: var(--green-bg);
      color: var(--green);
    }

    .streak-fire {
      font-size: 0.85rem;
      line-height: 1;
    }

    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      border-top: 1px solid var(--border);
      display: none;
    }

    .empty-state.visible { display: block; }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .empty-title {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--ink-2);
      margin-bottom: 0.5rem;
    }

    .empty-sub {
      font-size: 0.85rem;
      color: var(--ink-3);
      max-width: 280px;
      margin: 0 auto;
      line-height: 1.6;
    }

    @keyframes ripple {
      from { transform: scale(0); opacity: 0.4; }
      to   { transform: scale(2.5); opacity: 0; }
    }

    .ripple {
      position: absolute;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--amber);
      animation: ripple 350ms ease-out forwards;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      header { padding: 1rem; gap: 0.5rem; }
      .logo { font-size: 1.2rem; }
      .week-label { font-size: 0.65rem; min-width: 7rem; }
      main { padding: 1rem 0.75rem 0; }

      .col-headers,
      .habit-row {
        grid-template-columns: minmax(0, 1fr) repeat(7, 38px) 56px;
      }

      .check-btn { width: 24px; height: 24px; border-radius: 5px; }
      .check-btn svg { width: 11px; height: 11px; }
      .habit-name-text { font-size: 0.8rem; }
      .streak-pill { padding: 2px 6px; font-size: 0.65rem; }
      .col-header .day-num { font-size: 0.75rem; }
    }

    @media (max-width: 400px) {
      .today-btn { display: none; }
      .col-headers,
      .habit-row {
        grid-template-columns: minmax(0, 1fr) repeat(7, 32px) 48px;
      }
      .check-btn { width: 20px; height: 20px; border-radius: 4px; }
      .check-btn svg { width: 9px; height: 9px; stroke-width: 2.5; }
      .streak-fire { display: none; }
      .streak-pill { padding: 2px 5px; }
    }

    :focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .check-btn:focus-visible {
      outline-offset: 3px;
    }

    .past-week-note {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-3);
      padding: 0.75rem 0 0;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

<header role="banner">
  <h1 class="logo">streak<span>.</span></h1>

  <nav class="week-nav" aria-label="Week navigation">
    <button class="nav-btn" id="prev-week" aria-label="Previous week" title="Previous week">&#8592;</button>
    <span class="week-label" id="week-label" aria-live="polite"></span>
    <button class="nav-btn" id="next-week" aria-label="Next week" title="Next week">&#8594;</button>
    <button class="today-btn hidden" id="today-btn" aria-label="Jump to current week">This week</button>
  </nav>
</header>

<main>
  <section class="add-form" aria-label="Add new habit">
    <label for="habit-input" class="sr-only">New habit name</label>
    <input
      type="text"
      id="habit-input"
      class="add-input"
      placeholder="Add a habit e.g. Read 30 min, Exercise, Meditate…"
      maxlength="60"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button class="add-btn" id="add-btn" type="button">Add habit</button>
  </section>

  <div class="grid-wrap" role="region" aria-label="Habit tracker grid">
    <div class="col-headers" id="col-headers" role="row">
      <div class="col-header" role="columnheader" aria-label="Habit name">Habit</div>
    </div>
    <div id="habits-list" role="rowgroup"></div>
    <div class="empty-state" id="empty-state" role="status" aria-live="polite">
      <div class="empty-icon" aria-hidden="true">◻</div>
      <p class="empty-title">No habits yet</p>
      <p class="empty-sub">Add your first habit above and start building your streak today.</p>
    </div>
  </div>

  <p class="past-week-note" id="past-note" style="display:none">
    Viewing past week: checkmarks are locked
  </p>
</main>

<style>
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>

<script>
(() => {
  const WEEK_START = 1; 

  const store = {
    get habits() {
      try { return JSON.parse(localStorage.getItem('streak_habits') || '[]'); }
      catch { return []; }
    },
    set habits(v) { localStorage.setItem('streak_habits', JSON.stringify(v)); },

    get checks() {
      try { return JSON.parse(localStorage.getItem('streak_checks') || '{}'); }
      catch { return {}; }
    },
    setCheck(habitId, dateKey, val) {
      const checks = this.checks;
      if (!checks[habitId]) checks[habitId] = {};
      if (val) checks[habitId][dateKey] = true;
      else delete checks[habitId][dateKey];
      localStorage.setItem('streak_checks', JSON.stringify(checks));
    },
    isChecked(habitId, dateKey) {
      const checks = this.checks;
      return !!(checks[habitId] && checks[habitId][dateKey]);
    }
  };

  function todayKey() { return fmtKey(new Date()); }

  function fmtKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function parseKey(k) {
    const [y,m,d] = k.split('-').map(Number);
    return new Date(y, m-1, d);
  }

  function weekStart(offsetWeeks) {
    const today = new Date();
    const dow = today.getDay();
    const diff = (dow - WEEK_START + 7) % 7;
    const monday = new Date(today);
    monday.setDate(today.getDate() - diff + offsetWeeks * 7);
    monday.setHours(0,0,0,0);
    return monday;
  }

  function weekDays(offsetWeeks) {
    const start = weekStart(offsetWeeks);
    return Array.from({length: 7}, (_, i) => {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      return d;
    });
  }

  function isFuture(d) {
    const t = new Date(); t.setHours(23,59,59,999);
    return d > t;
  }

  function isToday(d) { return fmtKey(d) === todayKey(); }

  function fmtWeekLabel(days) {
    const opts = { month: 'short', day: 'numeric' };
    const y = days[6].getFullYear();
    const s = days[0].toLocaleDateString('en-US', opts);
    const e = days[6].toLocaleDateString('en-US', opts);
    return `${s} – ${e}, ${y}`;
  }

  function dayName(d) {
    return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  }

  function computeStreak(habitId) {
    const checks = store.checks;
    const hChecks = checks[habitId] || {};
    const today = new Date();
    today.setHours(0,0,0,0);

    let streak = 0;
    const cur = new Date(today);

    const todayK = fmtKey(cur);
    const todayChecked = !!hChecks[todayK];

    if (!todayChecked) {
      cur.setDate(cur.getDate() - 1);
      const yestK = fmtKey(cur);
      if (!hChecks[yestK]) return 0;
    }

    while (true) {
      const k = fmtKey(cur);
      if (hChecks[k]) {
        streak++;
        cur.setDate(cur.getDate() - 1);
      } else break;
    }
    return streak;
  }

  let weekOffset = 0;

  function render() {
    const habits = store.habits;
    const days = weekDays(weekOffset);
    const tk = todayKey();
    const isCurrentWeek = weekOffset === 0;
    const isPastWeek = weekOffset < 0;

    document.getElementById('week-label').textContent = fmtWeekLabel(days);

    const todayBtn = document.getElementById('today-btn');
    if (weekOffset !== 0) todayBtn.classList.remove('hidden');
    else todayBtn.classList.add('hidden');

    document.getElementById('past-note').style.display = isPastWeek ? 'block' : 'none';

    const colHeaders = document.getElementById('col-headers');
    colHeaders.innerHTML = '';
    const habitHeader = document.createElement('div');
    habitHeader.className = 'col-header';
    habitHeader.setAttribute('role', 'columnheader');
    habitHeader.textContent = 'Habit';
    colHeaders.appendChild(habitHeader);

    days.forEach(d => {
      const h = document.createElement('div');
      h.className = 'col-header' + (isToday(d) ? ' is-today' : '');
      h.setAttribute('role', 'columnheader');
      h.setAttribute('aria-label', d.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'}));
      h.innerHTML = `<span>${dayName(d)}</span><span class="day-num">${d.getDate()}</span>`;
      colHeaders.appendChild(h);
    });

    const streakHeader = document.createElement('div');
    streakHeader.className = 'streak-header';
    streakHeader.setAttribute('role', 'columnheader');
    streakHeader.textContent = 'Streak';
    colHeaders.appendChild(streakHeader);

    const list = document.getElementById('habits-list');
    list.innerHTML = '';

    const empty = document.getElementById('empty-state');
    if (habits.length === 0) {
      empty.classList.add('visible');
    } else {
      empty.classList.remove('visible');
      habits.forEach(habit => {
        const row = buildRow(habit, days, isCurrentWeek, isPastWeek, tk);
        list.appendChild(row);
      });
    }
  }

  function buildRow(habit, days, isCurrentWeek, isPastWeek, tk) {
    const row = document.createElement('div');
    row.className = 'habit-row';
    row.setAttribute('role', 'row');
    row.dataset.habitId = habit.id;

    const nameCell = document.createElement('div');
    nameCell.className = 'habit-name-cell';
    nameCell.setAttribute('role', 'rowheader');

    const nameText = document.createElement('span');
    nameText.className = 'habit-name-text';
    nameText.textContent = habit.name;
    nameText.title = habit.name;

    const actions = document.createElement('div');
    actions.className = 'habit-actions';
    actions.setAttribute('aria-label', 'Habit actions');

    const editBtn = document.createElement('button');
    editBtn.className = 'action-btn edit';
    editBtn.setAttribute('aria-label', `Rename habit: ${habit.name}`);
    editBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    editBtn.addEventListener('click', e => { e.stopPropagation(); startRename(habit.id, nameCell); });

    const delBtn = document.createElement('button');
    delBtn.className = 'action-btn delete';
    delBtn.setAttribute('aria-label', `Delete habit: ${habit.name}`);
    delBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteHabit(habit.id, habit.name); });

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    nameCell.appendChild(nameText);
    nameCell.appendChild(actions);
    row.appendChild(nameCell);

    days.forEach(d => {
      const dateKey = fmtKey(d);
      const future = isFuture(d);
      const today = isToday(d);
      const checked = store.isChecked(habit.id, dateKey);

      const cell = document.createElement('div');
      cell.className = 'check-cell' + (today ? ' is-today' : '') + (future ? ' is-future' : '');
      cell.setAttribute('role', 'gridcell');

      const btn = document.createElement('button');
      btn.className = 'check-btn' + (checked ? ' checked' : '');
      btn.setAttribute('type', 'button');
      btn.setAttribute('aria-label', `${habit.name} on ${d.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'})}`);
      btn.setAttribute('aria-pressed', String(checked));
      btn.disabled = future;
      if (future) btn.setAttribute('aria-disabled', 'true');

      btn.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`;

      if (!future) {
        btn.addEventListener('click', () => {
          const nowChecked = btn.classList.contains('checked');
          const newVal = !nowChecked;
          store.setCheck(habit.id, dateKey, newVal);
          btn.classList.toggle('checked', newVal);
          btn.setAttribute('aria-pressed', String(newVal));

          if (newVal) {
            const rip = document.createElement('div');
            rip.className = 'ripple';
            cell.appendChild(rip);
            setTimeout(() => rip.remove(), 400);
          }

          updateStreakPill(row, habit.id);
        });
      }

      cell.appendChild(btn);
      row.appendChild(cell);
    });

    const streakCell = document.createElement('div');
    streakCell.className = 'streak-cell';
    streakCell.setAttribute('role', 'gridcell');

    const streak = computeStreak(habit.id);
    const pill = document.createElement('span');
    pill.className = 'streak-pill' + (streak > 0 ? (streak >= 7 ? ' active long' : ' active') : '');
    pill.setAttribute('aria-label', `${streak} day streak`);

    if (streak > 0) {
      const fire = document.createElement('span');
      fire.className = 'streak-fire';
      fire.setAttribute('aria-hidden', 'true');
      fire.textContent = streak >= 7 ? '★' : '●';
      pill.appendChild(fire);
    }

    const num = document.createElement('span');
    num.textContent = streak > 0 ? `${streak}d` : ':';
    pill.appendChild(num);

    streakCell.appendChild(pill);
    row.appendChild(streakCell);

    return row;
  }

  function updateStreakPill(row, habitId) {
    const streakCell = row.querySelector('.streak-cell');
    const streak = computeStreak(habitId);
    const pill = streakCell.querySelector('.streak-pill');
    pill.className = 'streak-pill' + (streak > 0 ? (streak >= 7 ? ' active long' : ' active') : '');
    pill.setAttribute('aria-label', `${streak} day streak`);
    pill.innerHTML = '';
    if (streak > 0) {
      const fire = document.createElement('span');
      fire.className = 'streak-fire';
      fire.setAttribute('aria-hidden', 'true');
      fire.textContent = streak >= 7 ? '★' : '●';
      pill.appendChild(fire);
    }
    const num = document.createElement('span');
    num.textContent = streak > 0 ? `${streak}d` : ':';
    pill.appendChild(num);
  }

  function addHabit() {
    const input = document.getElementById('habit-input');
    const name = input.value.trim();
    if (!name) {
      input.focus();
      input.style.borderColor = 'var(--red)';
      setTimeout(() => { input.style.borderColor = ''; }, 1200);
      return;
    }
    const habits = store.habits;
    habits.push({ id: `h_${Date.now()}_${Math.random().toString(36).slice(2,6)}`, name });
    store.habits = habits;
    input.value = '';
    render();
    setTimeout(() => {
      const rows = document.querySelectorAll('.habit-row');
      if (rows.length) rows[rows.length-1].querySelector('.check-btn')?.focus();
    }, 50);
  }

  function deleteHabit(id, name) {
    if (!confirm(`Remove "${name}" and all its checkmarks?`)) return;
    let habits = store.habits;
    habits = habits.filter(h => h.id !== id);
    store.habits = habits;
    const checks = store.checks;
    delete checks[id];
    localStorage.setItem('streak_checks', JSON.stringify(checks));
    render();
  }

  function startRename(id, nameCell) {
    const nameText = nameCell.querySelector('.habit-name-text');
    const current = nameText.textContent;

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'habit-name-input';
    inp.value = current;
    inp.maxLength = 60;
    inp.setAttribute('aria-label', 'Edit habit name');

    nameText.replaceWith(inp);
    inp.focus();
    inp.select();

    function commit() {
      const val = inp.value.trim();
      if (val && val !== current) {
        let habits = store.habits;
        const h = habits.find(h => h.id === id);
        if (h) h.name = val;
        store.habits = habits;
      }
      render();
    }

    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
      if (e.key === 'Escape') { inp.value = current; inp.blur(); }
    });
  }

  document.getElementById('prev-week').addEventListener('click', () => { weekOffset--; render(); });
  document.getElementById('next-week').addEventListener('click', () => {
    if (weekOffset < 0) { weekOffset++; render(); }
    else if (weekOffset === 0) {
      const btn = document.getElementById('next-week');
      btn.style.transform = 'translateX(3px)';
      setTimeout(() => btn.style.transform = 'translateX(-3px)', 80);
      setTimeout(() => btn.style.transform = '', 160);
    }
  });
  document.getElementById('today-btn').addEventListener('click', () => { weekOffset = 0; render(); });

  document.getElementById('add-btn').addEventListener('click', addHabit);
  document.getElementById('habit-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addHabit();
  });

  document.getElementById('habits-list').addEventListener('keydown', e => {
    if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft' && e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
    const btns = [...document.querySelectorAll('.check-btn:not([disabled])')];
    const idx = btns.indexOf(document.activeElement);
    if (idx === -1) return;
    const cols = 7;
    let next;
    if (e.key === 'ArrowRight') next = btns[idx + 1];
    if (e.key === 'ArrowLeft') next = btns[idx - 1];
    if (e.key === 'ArrowDown') next = btns[idx + cols];
    if (e.key === 'ArrowUp') next = btns[idx - cols];
    if (next) { e.preventDefault(); next.focus(); }
  });

  render();
})();
</script>
</body>
</html>
